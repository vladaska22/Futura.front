server {
    listen 80;
    server_name futuraflow.com; # Ваш майбутній домен

    # 1. Віддаємо статику React (з папки dist)
    location / {
        root /var/www/futuraflow/html; # Шлях до зібраного фронтенду на сервері
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Критично важливо для роутингу в React!
    }

    # 2. Проксі на Java-бекенд (вирішення CORS)
    location /api/ {
        proxy_pass http://localhost:8080; # Порт твого Spring Boot
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 3. WebSockets (якщо використовуються)
    location /ws/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
